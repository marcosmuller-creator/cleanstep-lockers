<script>
// ── NAVIGATION ──
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const s = document.getElementById(id);
  if (s) { s.classList.add('active'); s.scrollTop = 0; }
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2200);
}

// ── LOGIN VALIDATION ──
function doLogin() {
  const email = document.getElementById('login-email');
  const pass = document.getElementById('login-pass');
  const ge = document.getElementById('ig-email');
  const gp = document.getElementById('ig-pass');
  let valid = true;
  ge.classList.remove('has-error'); gp.classList.remove('has-error');
  email.classList.remove('error'); pass.classList.remove('error');
  if (!email.value.trim()) { ge.classList.add('has-error'); email.classList.add('error'); valid = false; }
  if (!pass.value.trim()) { gp.classList.add('has-error'); pass.classList.add('error'); valid = false; }
  if (valid) go('screen-home');
}

// ── SERVICE SELECTION ──
let selSvc = 'Higienização Premium', selPrice = 'R$ 89,90';
function selectService(name, price) {
  selSvc = name; selPrice = price;
  const el = document.getElementById('pay-svc');
  const elp = document.getElementById('pay-price');
  if (el) el.textContent = name;
  if (elp) elp.textContent = price;
  go('screen-map');
}

// ── PAYMENT TABS ──
function switchTab(t) {
  document.getElementById('tab-pix').classList.toggle('active', t==='pix');
  document.getElementById('tab-card').classList.toggle('active', t==='card');
  document.getElementById('pix-panel').style.display = t==='pix' ? 'block' : 'none';
  document.getElementById('card-panel').style.display = t==='card' ? 'block' : 'none';
}
function switchFeeTab(t) {
  document.getElementById('fee-tab-pix').classList.toggle('active', t==='pix');
  document.getElementById('fee-tab-card').classList.toggle('active', t==='card');
  document.getElementById('fee-pix-panel').style.display = t==='pix' ? 'block' : 'none';
  document.getElementById('fee-card-panel').style.display = t==='card' ? 'block' : 'none';
}

// ── PHOTO CAPTURE (simulated) ──
const photoEmojis = ['👟','👠','👢','🥿','👞'];
function capturePhoto(id) {
  if (id === 'main') {
    const p = document.getElementById('main-photo');
    p.innerHTML = `<span style=&quot;font-size:64px&quot;>${photoEmojis[Math.floor(Math.random()*photoEmojis.length)]}</span><p style=&quot;color:rgba(255,255,255,.6)&quot;>Foto registrada ✅</p>`;
    p.style.background = '#1A3A2A';
  } else {
    const th = document.getElementById('th'+id);
    if (th) { th.innerHTML = photoEmojis[id % photoEmojis.length]; th.classList.add('filled'); }
  }
  showToast('Foto registrada com sucesso ✅');
}

// ── LOCKER UNLOCK ──
function unlockLocker() {
  const door = document.getElementById('locker-door');
  const btn = document.getElementById('unlock-btn');
  const status = document.getElementById('locker-status');
  btn.textContent = '⏳ Desbloqueando...';
  btn.disabled = true;
  setTimeout(() => {
    door.classList.add('open');
    status.textContent = '🎉 Locker aberto! Deposite seu calçado.';
    btn.textContent = '✅ Calçado depositado';
    btn.disabled = false;
    btn.onclick = () => go('screen-pickup-code');
  }, 800);
}

// ── MAP LOCKER SELECTION ──
function selectLocker(id) {
  [1,2,3,4].forEach(i => {
    const li = document.getElementById('li'+i);
    if (li) li.classList.toggle('selected', i===id);
  });
  showToast(`Locker selecionado`);
}

// ── MAP FILTERS ──
function filterLockers(el, type) {
  document.querySelectorAll('#screen-map .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  showToast('Filtro aplicado');
}

// ── HISTORY FILTERS ──
function filterHistory(el, type) {
  document.querySelectorAll('#screen-history .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// ── RATING STARS ──
function rateStar(n) {
  document.querySelectorAll('#stars-row .star').forEach((s, i) => {
    s.classList.toggle('active', i < n);
  });
  showToast(n === 5 ? 'Obrigado pela avaliação! 🌟' : `${n} estrelas registradas`);
}
</script>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const s=document.getElementById(id);
  if(s){s.classList.add('active');s.scrollTop=0;}
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},2200);
}

function doProvLogin(){
  const id=document.getElementById('prov-id').value.trim();
  const pw=document.getElementById('prov-pass').value.trim();
  if(!id||!pw){showToast('Preencha ID e senha');return;}
  go('screen-p-dashboard');
  // animate rings after navigation
  setTimeout(()=>{
    animateRing('ring1','ring1-pct',65);
    animateRing('ring2','ring2-pct',30);
  },400);
}

function animateRing(ringId,pctId,target){
  const ring=document.getElementById(ringId);
  const pct=document.getElementById(pctId);
  if(!ring||!pct)return;
  const circumference=339.3;
  let current=0;
  const step=target/40;
  const timer=setInterval(()=>{
    current=Math.min(current+step,target);
    ring.style.strokeDashoffset=circumference-(circumference*current/100);
    pct.textContent=Math.round(current)+'%';
    if(current>=target)clearInterval(timer);
  },25);
}

function unlockProvLocker(){
  const door=document.getElementById('p-locker-door');
  const btn=document.getElementById('p-unlock-btn');
  const status=document.getElementById('p-locker-status');
  btn.textContent='⏳ Desbloqueando...';btn.disabled=true;
  setTimeout(()=>{
    door.classList.add('open');
    status.textContent='🎉 Locker aberto! Retire os calçados.';
    btn.textContent='✅ Calçados retirados';btn.disabled=false;
    btn.onclick=()=>go('screen-p-scan-1');
  },800);
}

function unlockDepLocker(){
  const door=document.getElementById('dep-locker-door');
  const btn=document.getElementById('dep-unlock-btn');
  const status=document.getElementById('dep-locker-status');
  btn.textContent='⏳ Desbloqueando...';btn.disabled=true;
  setTimeout(()=>{
    door.classList.add('open');
    status.textContent='📦 Locker aberto! Deposite o calçado.';
    btn.textContent='✅ Calçado depositado';btn.disabled=false;
    btn.onclick=()=>go('screen-p-deposit-confirm');
  },800);
}

function simulateScan(boxId,resultId,nextScreen){
  const box=document.getElementById(boxId);
  if(box){box.style.background='#0E2A1C';box.innerHTML='<span style=&quot;font-size:48px&quot;>⏳</span><p style=&quot;color:rgba(255,255,255,.6);font-size:14px&quot;>Lendo ticket...</p>';}
  setTimeout(()=>{
    if(box){box.style.background='#0E3A20';box.innerHTML='<span style=&quot;font-size:48px&quot;>✅</span><p style=&quot;color:rgba(255,255,255,.8);font-size:14px;font-weight:700&quot;>Ticket lido com sucesso!</p>';}
    const res=document.getElementById(resultId);
    if(res)res.style.display='block';
    showToast('Ticket vinculado! PREST-2847 ✅');
    setTimeout(()=>go(nextScreen),1200);
  },1400);
}

function manualLink(inputId,resultId,nextScreen){
  const val=document.getElementById(inputId)?.value.trim();
  if(!val){showToast('Digite o código do ticket');return;}
  const res=document.getElementById(resultId);
  if(res)res.style.display='block';
  showToast('Ticket '+val+' vinculado! ✅');
  setTimeout(()=>go(nextScreen),1000);
}

function toggleCheck(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('checked');
}

function captureVerifyPhoto(id){
  const el=document.getElementById(id);
  if(el){el.style.background='#0A2A15';el.innerHTML='<span style=&quot;font-size:56px&quot;>👟</span><p style=&quot;color:rgba(255,255,255,.6);font-size:13px&quot;>Foto registrada ✅</p>';}
  showToast('Foto de verificação registrada ✅');
}

function captureDepositPhoto(){
  const el=document.getElementById('deposit-photo');
  if(el){el.style.background='#0A2A15';el.innerHTML='<span style=&quot;font-size:56px&quot;>👟</span><p style=&quot;color:rgba(255,255,255,.6);font-size:13px&quot;>Foto pós-serviço registrada ✅</p>';}
  showToast('Foto pós-serviço registrada ✅');
}

// Animate rings when in-service screen is shown
const observer=new MutationObserver(()=>{
  const inservice=document.getElementById('screen-p-inservice');
  if(inservice&amp;&amp;inservice.classList.contains('active')){
    setTimeout(()=>{animateRing('ring1','ring1-pct',65);animateRing('ring2','ring2-pct',30);},200);
  }
});
observer.observe(document.getElementById('phone'),{childList:true,subtree:true,attributes:true,attributeFilter:['class']});
</script>
